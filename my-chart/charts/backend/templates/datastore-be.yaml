apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-backend
  namespace: {{ .Values.studentStore.backend.namespace }}
  labels:
    type: backend
  

spec:
  replicas: {{ .Values.studentStore.backend.replicaCount }}

  selector:
    matchLabels:
      type: backend

  template:
    metadata:
      labels:
        type: backend

    spec:
      containers:
        - name: datastore-backend
          image: {{ .Values.studentStore.backend.image }}

          ports:
            - containerPort: {{ .Values.studentStore.backend.port }}

          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlHost

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlUname

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datastore-be-secret
                  key: mysqlPassword

            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update

            # ✅ Added (prevents dialect detection issues)
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.MySQL8Dialect

          resources:
            {{- toYaml .Values.studentStore.backend.resources | nindent 12 }}

          # ✅ Startup Probe (for DB + Hibernate delay)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 15   # ~150 seconds max startup time

          # ✅ Readiness Probe (traffic control)
          readinessProbe:
            {{- toYaml .Values.studentStore.backend.readinessProbe | nindent 12 }}

          # ✅ Liveness Probe (only kill if truly dead)
          livenessProbe:
            {{- toYaml .Values.studentStore.backend.livenessProbe | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: datastore-backend-svc
  namespace: {{ .Values.studentStore.backend.namespace }}
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/scrape: "true"

spec:
  selector:
    type: backend

  ports:
    - port: {{ .Values.backendSvc.port }}
      targetPort: {{ .Values.studentStore.backend.port }}
