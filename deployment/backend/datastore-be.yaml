apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-backend
  namespace: backend
  labels:
    type: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      type: backend

  template:
    metadata:
      labels:
        type: backend

    spec:
      containers:
        - name: datastore-backend
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

          ports:
            - containerPort: 8084

          env:
            # ✅ Correct Spring Boot DB configs
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlHost

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlUname

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datastore-be-secret
                  key: mysqlPassword

            # ✅ IMPORTANT: Auto create tables
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update

          resources:
            requests:
              cpu: 100m
              memory: "500Mi"
            limits:
              cpu: 1
              memory: "1Gi"

          # ✅ Startup probe (gives time for DB connection)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 10

          # ✅ Readiness probe
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5

          # ✅ Liveness probe
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5

---

apiVersion: v1
kind: Service
metadata:
  name: datastore-backend-svc
  namespace: backend
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/scrape: "true"

spec:
  selector:
    type: backend

  ports:
    - port: 8081
      targetPort: 8084
