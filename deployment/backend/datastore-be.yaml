apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-backend
  namespace: backend
  labels:
    type: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      type: backend

  template:
    metadata:
      labels:
        type: backend

    spec:
      containers:
        - name: datastore-backend
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

          ports:
            - containerPort: 8084

          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlHost

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlUname

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datastore-be-secret
                  key: mysqlPassword

            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update

            # ✅ Added (prevents dialect detection issues)
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.MySQL8Dialect

          resources:
            requests:
              cpu: 100m
              memory: "500Mi"
            limits:
              cpu: 1
              memory: "1Gi"

          # ✅ Startup Probe (for DB + Hibernate delay)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 15   # ~150 seconds max startup time

          # ✅ Readiness Probe (traffic control)
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5

          # ✅ Liveness Probe (only kill if truly dead)
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 90   # IMPORTANT: after startup
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: datastore-backend-svc
  namespace: backend
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/scrape: "true"

spec:
  selector:
    type: backend

  ports:
    - port: 8081
      targetPort: 8084