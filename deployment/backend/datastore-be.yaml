apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-backend
  namespace: backend
  labels:
    type: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      type: backend
  template:
    metadata:
      labels:
        type: backend
    spec:
      containers:
        - name: datastore-backend
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

          ports:
            - containerPort: 8084   # ✅ IMPORTANT

          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlHost
            - name: MYSQL_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlUname
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datastore-be-secret
                  key: mysqlPassword

          resources:
            requests:
              cpu: 100m
              memory: "500Mi"
            limits:
              cpu: 1
              memory: "1Gi"

          # ✅ STARTUP PROBE (MOST IMPORTANT)
          startupProbe:
            httpGet:
              path: /actuator
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 5
            failureThreshold: 10

          # ✅ READINESS PROBE
          readinessProbe:
            httpGet:
              path: /actuator
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5

          # ✅ LIVENESS PROBE
          livenessProbe:
            httpGet:
              path: /actuator
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

---

apiVersion: v1
kind: Service
metadata:
  name: datastore-backend-svc
  namespace: backend
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/scrape: "true"
spec:
  ports:
    - port: 8081
      targetPort: 8084
  selector:
    type: backend
